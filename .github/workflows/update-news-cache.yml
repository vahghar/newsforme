name: Update News Cache Daily

on:
  schedule:
    - cron: '0 8 * * *'
  # This is so, I can manually run the pipeline for testing
  workflow_dispatch:

jobs:
  update-cache:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Start Next.js development server
        run: npm run dev &
        env:
          API_KEY: ${{ secrets.API_KEY }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          AGENTVERSE_API_KEY: ${{ secrets.AGENTVERSE_API_KEY }}

      - name: Wait for server to be ready
        # Give Next.js a moment to compile and start serving
        run: |
          echo "Waiting for Next.js server..."
          npx wait-on http://localhost:3000 -t 60000

      - name: Run cache generation script
        run: node scripts/generate_cache.js
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3000

      - name: Commit and push updated cache
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Only add the cache directory changes
          git add cache/
          
          # Commit if there are changes. If no changes, git commit exits with 1 (which we ignore using || true)
          git commit -m "chore: update daily news cache [skip ci]" || echo "No changes to commit"
          
          # Push back to the current branch
          git push
